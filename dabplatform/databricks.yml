# This is a Databricks asset bundle definition for dabplatform.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: dabplatform
  uuid: b7a57892-93d4-4c20-b596-307ccdc9796s

workspace:
  root_path: ~/Workspace/IngestionFramework/${bundle.name}

sync:
  include:
    - src/**
include:
  - resources/*.yml

# Variable declarations. These variables are assigned in the dev/prod targets below.
variables:
  catalog:
    description: The catalog to use
  schema:
    description: The schema to use

targets:
  dev:
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.
    mode: development
    default: true
    workspace:
      host: https://adb-7405613582925078.18.azuredatabricks.net
    variables:
      catalog: dev
      schema: dev
  prod:
    mode: production
    workspace:
      host: https://adb-7405613582925078.18.azuredatabricks.net
      # We explicitly deploy to /Workspace/Users/noorah@godevsuite374.onmicrosoft.com to make sure we only have a single copy.
      root_path: /Workspace/IngestionFramework/${bundle.name}
    variables:
      catalog: dev
      schema: prod
    permissions:
      - user_name: noorah@godevsuite374.onmicrosoft.com
        level: CAN_MANAGE
