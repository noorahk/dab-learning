# The main pipeline for dabplatform
#Test
resources:
  pipelines:
    dabplatform_etl:
      name: dabplatform_etl
      catalog: ${var.catalog}
      schema: ${var.schema}
      serverless: true
      root_path: "../src/dabplatform_etl"

      libraries:
        - glob:
            include: ../src/dabplatform_etl/transformations/**

      environment:
        dependencies:
          # We include every dependency defined by pyproject.toml by defining an editable environment
          # that points to the folder where pyproject.toml is deployed.
          - --editable ${workspace.file_path}
